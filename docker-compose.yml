version: "3.8"

services:
  codex-proxy:
    build: .
    ports:
      - "4242:4242"
    environment:
      - CODEX_PROXY_API_KEY=${CODEX_PROXY_API_KEY:-}
      - CODEX_PROXY_BASE_URL=${CODEX_PROXY_BASE_URL:-}
      - CODEX_PROXY_MODEL=${CODEX_PROXY_MODEL:-glm-5.1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./config:/root/.codex-proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4242/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
